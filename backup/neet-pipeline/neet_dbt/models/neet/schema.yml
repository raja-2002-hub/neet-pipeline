version: 2

models:
  - name: stg_questions
    description: "Staged questions with quality flags added"
    columns:
      - name: question_id
        description: "Unique question identifier"
        tests:
          - unique
          - not_null
      - name: section
        description: "Physics, Chemistry or Biology"
        tests:
          - not_null
          - accepted_values:
              values: ['Physics', 'Chemistry', 'Biology']
      - name: confidence
        description: "Extraction confidence 0 to 1"
        tests:
          - not_null
      - name: quality_flag
        description: "ok, low_confidence, missing_text or invalid_answer"
        tests:
          - not_null
          - accepted_values:
              values: ['ok', 'low_confidence', 'missing_text', 'invalid_answer']

  - name: dim_questions_clean
    description: "Clean high quality questions only confidence >= 0.8"
    columns:
      - name: question_id
        description: "Unique question identifier"
        tests:
          - unique
          - not_null
      - name: quality_flag
        description: "Always ok in this table"
        tests:
          - accepted_values:
              values: ['ok']

  - name: subject_summary
    description: "Question counts by subject topic and difficulty"